<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub FM</title>
    <!-- PWA meta tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1117">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <!-- CodeMirror CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/default.min.css">
    <!-- Our custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- CodeMirror JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/shell/shell.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/yaml/yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/sql/sql.min.js"></script>
    <!-- Marked for Markdown preview -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <svg viewBox="0 0 16 16" width="18" height="18"><path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            GitHub FM
        </div>
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText" style="font-size:11px;color:var(--text-muted);">Not connected</span>
        <div class="sep"></div>
        <input type="password" class="token-input" id="tokenInput" placeholder="Token">
        <button class="btn small" id="connectBtn">Connect</button>
        <button class="btn small" id="disconnectBtn" style="display:none;">Clear</button>
        <a href="https://github.com/settings/tokens" target="_blank" class="btn small" title="Generate new token">🔑 Get Token</a>
        <div class="sep"></div>
        <select class="repo-select" id="repoSelect" disabled><option value="">Select repo</option></select>
        <select id="branchSelect" disabled><option value="">Branch</option></select>
        <div class="sep"></div>
        <button class="btn small primary" id="newFileBtn" disabled>+ New File</button>
        <button class="btn small" id="newFolderBtn" disabled>New Folder</button>
        <div class="sep"></div>
        <button class="btn small primary" id="saveFileBtn" disabled>💾 Save</button>
        <button class="btn small danger" id="deleteFileBtn" disabled>🗑 Delete</button>
        <button class="btn small" id="copyContentBtn" disabled>📋 Copy</button>
        <button class="btn small" id="historyBtn" disabled>📜 History</button>
        <button class="btn small" id="mdPreviewBtn" disabled style="display:none">👁 Preview</button>
        <div class="sep"></div>
        <button class="btn small" id="themeToggle" title="Switch theme">🌓 Theme</button>
    </div>

    <!-- Main -->
    <div class="main">
        <div class="sidebar">
            <div class="sidebar-header">
                <span>📂 Explorer</span>
                <div>
                    <button class="btn small" id="refreshTreeBtn" style="border:none;background:none;">🔄</button>
                    <button class="btn small" id="collapseAllBtn" style="border:none;background:none;">📉</button>
                </div>
            </div>
            <div class="file-tree" id="fileTree">
                <div style="padding:20px;text-align:center;color:var(--text-muted);"><div style="font-size:28px;">📭</div><div>Connect a repository</div></div>
            </div>
            <div class="drop-zone" id="dropZone" style="display:none;">
                <div>📁 Drop files here to upload</div>
            </div>
        </div>
        <div class="editor-area">
            <div class="tab-bar" id="tabBar"></div>
            <div class="editor-container" id="editorContainer">
                <div class="placeholder" id="noFileMessage">
                    <div style="font-size:36px;">📝</div><div>Open a file to edit</div>
                    <div style="font-size:11px;">Ctrl+S Save · Ctrl+N New · Ctrl+W Close</div>
                </div>
                <div class="editor-wrapper" id="editorWrapper" style="display:none;">
                    <textarea id="codeEditor" style="display:none;"></textarea>
                </div>
                <div class="md-preview" id="mdPreview" style="display:none;"></div>
                <div class="image-preview" id="imagePreview" style="display:none;"></div>
                <div class="binary-notice" id="binaryNotice" style="display:none;">
                    <div style="font-size:36px;">📦</div><div>Binary file — preview only</div>
                </div>
            </div>
            <div class="status-bar">
                <span id="filePathDisplay">No file open</span>
                <span id="fileSizeDisplay"></span>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>
    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay" style="display:none;"><div class="modal" id="modalContent"></div></div>

    <!-- Our custom JavaScript -->
    <script src="script.js"></script>
</body>
</html>
